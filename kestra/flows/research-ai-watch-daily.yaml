id: research-ai-watch-daily
namespace: rand

description: >-
  Daily scheduled run for the composed `ai_watch_daily` preset. This flow delegates
  to `research-manual-run` so the orchestration shape stays easy to read.

triggers:
  - id: schedule-trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 8 * * *"
    timezone: "Asia/Tokyo"

tasks:
  - id: trigger-manual-flow
    type: io.kestra.plugin.scripts.http.Request
    uri: "{{ globals.kestra_base_url | default('http://localhost:8080') }}/api/v1/main/executions/webhook/rand/research-manual-run/{{ secret('RAND_RESEARCH_WEBHOOK_KEY') }}"
    method: POST
    headers:
      Content-Type: application/json
    body: |
      {
        "event_type": "schedule",
        "preset": "ai_watch_daily",
        "max_items": 8,
        "source": "kestra.schedule.ai_watch_daily"
      }

  - id: log-trigger
    type: io.kestra.plugin.core.log.Log
    message: "Triggered research-manual-run for ai_watch_daily preset"
